name: CI/CD Backend Docker

on:
  push:
    branches:
      - main
      - "be/**"

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: thanhlongg/mylaundry-backend:latest
          cache-from: type=registry,ref=thanhlongg/mylaundry-backend:buildcache
          cache-to: type=registry,ref=thanhlongg/mylaundry-backend:buildcache,mode=max
